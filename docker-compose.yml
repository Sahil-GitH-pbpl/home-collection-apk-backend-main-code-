services:
  apk-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: home-collection-apk-backend
    ports:
      - "2010:2010"
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "/home/arpraandhc/Desktop/arpra neo/arpra-neo/app/static/uploads:/home/arpraandhc/Desktop/arpra neo/arpra-neo/app/static/uploads"
      - "/home/arpraandhc/Downloads/home collection apk backend/app/static/generated/service_notes:/app/app/static/generated/service_notes"
    restart: unless-stopped
